name: Build Desktop Overlay App

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Dependencies
      run: dotnet restore

    - name: Publish Single Executable
      run: dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true

    - name: Upload .exe Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ControlOverlay-Executable
        path: bin/Release/net8.0-windows/win-x64/publish/
